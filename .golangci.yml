# golangci-lint configuration (ADR-009).
# Format targets golangci-lint v2.
version: "2"

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    # Локальное имя модуля (ADR-009) не содержит точки; без явного указания
    # встроенный gofumpt считает импорты "ai-studio-os/..." стандартной
    # библиотекой и сливает группы импортов. Убрать после переименования
    # модуля в github.com/<owner>/ai-studio-os.
    gofumpt:
      module-path: ai-studio-os
    goimports:
      local-prefixes:
        - ai-studio-os

linters:
  # Defaults (errcheck, govet, ineffassign, staticcheck, unused) stay enabled.
  enable:
    - misspell
    - revive
