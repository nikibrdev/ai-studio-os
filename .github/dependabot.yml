version: 2
updates:
  # go.mod пока без зависимостей (только контракты) — конфигурация готова
  # к моменту их появления (Domain Layer и далее).
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"

  # npm/pnpm — добавить при появлении apps/dashboard (Next.js).
