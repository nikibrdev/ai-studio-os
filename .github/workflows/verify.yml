name: verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    env:
      # Запрещает Go тихо докачивать более новый тулчейн, если инструмент
      # требует версию выше зафиксированной setup-go (ADR-009). Без этого
      # несовместимость маскируется auto-toolchain и вскрывается только
      # когда что-то другое (например, версия setup-go) меняет умолчание
      # GOTOOLCHAIN — см. BUGFIX-002.
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache: false

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "lts/*"

      - name: Install gofumpt
        run: go install mvdan.cc/gofumpt@v0.9.2

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0

      - name: Run verify
        run: make verify

      - name: Check Conventional Commits
        if: github.event_name == 'pull_request'
        run: bash scripts/check-commits.sh "origin/${{ github.event.pull_request.base.ref }}" HEAD

  integration:
    name: integration
    runs-on: ubuntu-latest
    # Не входит в обязательные статус-чеки main (только "verify") - падение
    # здесь не блокирует merge, см. docs/roadmap/EPIC-005-infrastructure-layer.md.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ai_studio_os
          POSTGRES_PASSWORD: ai_studio_os
          POSTGRES_DB: ai_studio_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_studio_os"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    env:
      GOTOOLCHAIN: local
      TEST_DATABASE_URL: postgres://ai_studio_os:ai_studio_os@localhost:5432/ai_studio_os?sslmode=disable
      TEST_QDRANT_URL: http://localhost:6333
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache: false

      # The qdrant image ships no docker healthcheck tool the `options:
      # --health-cmd` mechanism (used above for postgres) could call, so
      # readiness is polled from the runner itself instead (TASK-062).
      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/healthz; then exit 0; fi
            sleep 1
          done
          echo "Qdrant did not become healthy in time" >&2
          exit 1

      - name: Run integration tests
        run: go test -tags=integration ./...
